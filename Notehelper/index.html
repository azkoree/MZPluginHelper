<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMMZ 备注标签助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部状态栏 -->
    <header id="top-bar">
      <div class="top-left">
        <button id="btn-import" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导入插件
        </button>
        <input type="file" id="file-input" accept=".js" multiple hidden>
        <div id="plugin-dropdown" class="dropdown">
          <button id="btn-plugin-info" class="btn btn-ghost">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            已加载: <span id="plugin-count">0</span> 个插件
          </button>
          <div id="plugin-dropdown-content" class="dropdown-content"></div>
        </div>
      </div>
      <div class="top-right">
        <span class="stat-badge">标签总数: <span id="tag-count">0</span></span>
      </div>
    </header>

    <!-- 主内容区 -->
    <div id="main-content">
      <!-- 左侧 — 标签面板 -->
      <aside id="tag-panel">
        <div class="panel-toolbar">
          <div class="search-row">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="tag-search" placeholder="搜索标签… (Ctrl+F)" spellcheck="false">
            <select id="plugin-filter" title="按插件过滤">
              <option value="__all__">全部插件</option>
            </select>
          </div>
          <button id="btn-manual-add" class="btn btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            手动添加
          </button>
        </div>
        <div id="tag-list"></div>
        <div id="empty-state" class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <p>导入插件后，备注标签将在此显示</p>
          <p class="hint">支持拖拽 .js 文件到窗口</p>
        </div>
      </aside>

      <!-- 右侧 — 编辑区 -->
      <section id="editor-panel">
        <div id="tab-bar">
          <div id="tab-list"></div>
          <button id="btn-add-tab" class="btn btn-tab-add" title="新增标签页">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div id="editor-area">
          <textarea id="note-editor" spellcheck="false" placeholder="点击左侧标签，标签将插入到此处…&#10;&#10;提示：标签中的占位符 (x, #ffffff 等) 会自动选中，直接输入替换即可。"></textarea>
        </div>
        <div id="editor-toolbar">
          <div class="editor-info">
            <span id="char-count">0 字符</span>
          </div>
          <div class="editor-actions">
            <button id="btn-copy" class="btn btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              复制 (Ctrl+S)
            </button>
            <button id="btn-clear" class="btn btn-ghost">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              清空
            </button>
          </div>
        </div>
      </section>
    </div>

    <!-- 底部操作栏 -->
    <footer id="bottom-bar">
      <div class="bottom-left">
        <button id="btn-export-config" class="btn btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出标签配置
        </button>
        <button id="btn-import-config" class="btn btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          导入标签配置
        </button>
        <input type="file" id="config-input" accept=".json" hidden>
      </div>
      <div class="bottom-right">
        <span class="shortcut-hint">Ctrl+Shift+S 导出配置</span>
      </div>
    </footer>
  </div>

  <!-- 导入策略弹窗 -->
  <div id="strategy-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>导入策略</h3>
      <p>已有标签配置，如何处理新导入的标签？</p>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="strategy" value="overwrite">
          <span class="radio-title">覆盖</span>
          <span class="radio-desc">清空后用新标签替换</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="strategy" value="append" checked>
          <span class="radio-title">追加</span>
          <span class="radio-desc">保留现有标签，合并新标签</span>
        </label>
      </div>
      <div class="modal-actions">
        <button id="btn-strategy-confirm" class="btn btn-primary">确认</button>
        <button id="btn-strategy-cancel" class="btn btn-ghost">取消</button>
      </div>
    </div>
  </div>

  <!-- 手动添加标签弹窗 -->
  <div id="manual-modal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <h3>手动添加标签</h3>
      <p>输入自定义标签模板（如 <code>&lt;MyTag: x&gt;</code>）</p>
      <input type="text" id="manual-input" class="input-full" placeholder="<TagName: x>" spellcheck="false">
      <div class="modal-actions">
        <button id="btn-manual-confirm" class="btn btn-primary">添加</button>
        <button id="btn-manual-cancel" class="btn btn-ghost">取消</button>
      </div>
    </div>
  </div>

  <!-- 模板片段保存弹窗 -->
  <div id="snippet-modal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <h3>保存模板片段</h3>
      <p>将当前标签页内容保存为自定义模板</p>
      <input type="text" id="snippet-name-input" class="input-full" placeholder="模板名称" spellcheck="false">
      <div class="modal-actions">
        <button id="btn-snippet-save" class="btn btn-primary">保存</button>
        <button id="btn-snippet-cancel" class="btn btn-ghost">取消</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
